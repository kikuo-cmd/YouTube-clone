<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube クローン Pro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f9f9f9; }
        header { background-color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 20px; font-weight: bold; color: #ff0000; text-decoration: none; }
        .upload-box { background: #fff; padding: 20px; margin: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .upload-box input, .upload-box button { margin: 8px 0; display: block; width: 100%; max-width: 400px; padding: 8px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .video-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-wrapper video { width: 100%; height: 100%; }
        .thumbnail-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; cursor: pointer; }
        .video-info { padding: 15px; flex-grow: 1; }
        .video-title { font-weight: bold; font-size: 16px; margin: 0 0 10px 0; }
        .comment-section { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .comment-list { max-height: 120px; overflow-y: auto; font-size: 13px; color: #555; margin-bottom: 8px; }
        .comment-item { padding: 4px 0; border-bottom: 1px solid #f5f5f5; }
        .comment-input-box { display: flex; gap: 5px; }
        .comment-input-box input { flex-grow: 1; padding: 5px; font-size: 12px; }
        .comment-input-box button { padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">YouTube Clone Pro</a>
    </header>

    <div class="upload-box">
        <h3>動画を投稿する</h3>
        <input type="text" id="videoTitle" placeholder="動画のタイトルを入力">
        <label style="font-size: 12px; color: #666;">▼ 動画ファイル（必須）</label>
        <input type="file" id="videoFile" accept="video/*">
        <label style="font-size: 12px; color: #666;">▼ サムネイル画像（任意）</label>
        <input type="file" id="thumbFile" accept="image/*">
        <button id="uploadBtn">投稿する</button>
    </div>

    <div class="video-grid" id="videoGrid"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
